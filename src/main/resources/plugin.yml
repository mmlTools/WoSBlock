name: WoSBlock
version: '0.1.0'
main: com.wosblock.WoSBlockPlugin
api-version: '1.21'
author: WoSBlock
description: High-performance skyblock systems plugin scaffold.
softdepend:
  - Vault
commands:
  is:
    description: WoSBlock island command.
    usage: /is start
  ah:
    description: Auction House command.
    usage: /ah sell <price>
  hud:
    description: Toggle the SkyBlock HUD.
    usage: /hud toggle
  questie:
    description: Toggle the Questie quest log.
    usage: /questie toggle
  wosblock:
    description: WoSBlock administration command.
    usage: /wosblock help
    aliases: [wos]
    permission: wosblock.admin
    permission-message: You do not have permission to use WoSBlock admin commands.
permissions:
  wosblock.admin:
    default: op
